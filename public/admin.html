<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | Kurt Nievera</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="about.html"><i class="fas fa-user"></i> About</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
      <a href="register.html"><i class="fas fa-user-plus"></i> Register</a>
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
    </nav>

    <div class="container">
      <div class="profile-card">
        <h1 style="margin-bottom: 5px">🛡️ Admin Dashboard</h1>
        <p style="color: #718096; margin-bottom: 5px">
          Welcome, <span id="adminName">Admin</span>!
        </p>
        <p style="color: #a0aec0; font-size: 0.9rem; margin-bottom: 20px">
          Here are the messages sent via the Contact form:
        </p>

        <div id="loading" style="color: #667eea; padding: 20px">
          ⏳ Loading messages...
        </div>

        <div id="messageList" style="display: none; overflow-x: auto">
          <table class="admin-table" id="messagesTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="messagesBody">
              <!-- Data goes here -->
            </tbody>
          </table>
        </div>

        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>

    <script>
      // --- SECURITY: Check if user is logged in AND is admin ---
      const token = localStorage.getItem("authToken");
      const userName = localStorage.getItem("userName");
      const isAdmin = localStorage.getItem("isAdmin") === "true"; // NEW: Check admin status

      if (!token) {
        // No token? Kick them to login page.
        window.location.href = "/login.html";
      } else if (!isAdmin) {
        // Logged in but NOT admin? Redirect to home with error
        alert("Admin access only. You are not authorized to view this page.");
        window.location.href = "/index.html";
      } else {
        document.getElementById("adminName").textContent = userName || "Admin";
        fetchMessages();
      }

      function fetchMessages() {
        fetch("/api/admin/messages", {
          method: "GET",
          headers: {
            Authorization: token,
          },
        })
          .then((response) => {
            if (response.status === 401 || response.status === 403) {
              localStorage.removeItem("authToken");
              localStorage.removeItem("userName");
              localStorage.removeItem("isAdmin");
              window.location.href = "/login.html";
              return;
            }
            return response.json();
          })
          .then((messages) => {
            document.getElementById("loading").style.display = "none";

            if (messages && messages.length > 0) {
              document.getElementById("messageList").style.display = "block";
              const tbody = document.getElementById("messagesBody");
              tbody.innerHTML = "";

              messages.forEach((msg) => {
                const row = document.createElement("tr");
                row.innerHTML = `
              <td><strong>${escapeHtml(msg.name)}</strong></td>
              <td>${escapeHtml(msg.email)}</td>
              <td>${escapeHtml(msg.message)}</td>
              <td style="font-size: 0.8rem; color: #718096; white-space: nowrap;">${new Date(
                msg.createdAt
              ).toLocaleString()}</td>
            `;
                tbody.appendChild(row);
              });
            } else {
              document.getElementById("messageList").style.display = "block";
              document.getElementById("messagesBody").innerHTML =
                '<tr><td colspan="4" style="text-align: center; padding: 20px; color: #a0aec0;">📭 No messages sent yet.</td></tr>';
            }
          })
          .catch((err) => {
            document.getElementById("loading").textContent =
              "Failed to load messages. Please refresh.";
            console.error(err);
          });
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function logout() {
        localStorage.removeItem("authToken");
        localStorage.removeItem("userName");
        localStorage.removeItem("isAdmin");
        window.location.href = "/login.html";
      }
    </script>
  </body>
</html>
