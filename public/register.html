<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Kurt Nievera</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="about.html"><i class="fas fa-user"></i> About</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
      <a href="register.html" class="active"
        ><i class="fas fa-user-plus"></i> Register</a
      >
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
    </nav>

    <div class="container">
      <div class="profile-card">
        <h1 style="margin-bottom: 5px">Register</h1>

        <form
          id="registerForm"
          class="register-form"
          onsubmit="handleRegister(event)"
        >
          <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
          <input
            type="text"
            id="fullName"
            placeholder="Enter your full name"
            required
          />

          <label for="regEmail"
            ><i class="fas fa-envelope"></i> Email Address</label
          >
          <input
            type="email"
            id="regEmail"
            placeholder="Enter your email"
            required
          />

          <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
          <input
            type="password"
            id="regPassword"
            placeholder="Minimum 6 characters"
            required
            minlength="6"
          />

          <label for="regConfirmPassword"
            ><i class="fas fa-check-circle"></i> Confirm Password</label
          >
          <input
            type="password"
            id="regConfirmPassword"
            placeholder="Confirm your password"
            required
          />

          <button type="submit" class="btn-register">
            <i class="fas fa-user-plus"></i> Register Now
          </button>

          <div id="messageBox" class="message-box"></div>
        </form>

        <p style="margin-top: 15px; color: #718096; font-size: 0.9rem">
          Already have an account?
          <a href="login.html" style="color: #667eea; font-weight: 600"
            >Login here</a
          >
        </p>
      </div>
    </div>

    <script>
      function handleRegister(event) {
        event.preventDefault();

        const name = document.getElementById("fullName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        const confirmPassword =
          document.getElementById("regConfirmPassword").value;
        const messageBox = document.getElementById("messageBox");

        // Clear previous styles
        messageBox.className = "message-box";
        messageBox.style.display = "block";

        // Validation
        if (password !== confirmPassword) {
          messageBox.className = "message-box error";
          messageBox.textContent = "Passwords do not match!";
          return;
        }
        if (password.length < 6) {
          messageBox.className = "message-box error";
          messageBox.textContent = "Password must be at least 6 characters!";
          return;
        }

        // Loading state
        messageBox.className = "message-box";
        messageBox.textContent = "⏳ Registering...";
        messageBox.style.background = "#e2e8f0";
        messageBox.style.color = "#2d3748";

        // Send to Backend API (MongoDB)
        fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.error) {
              messageBox.className = "message-box error";
              messageBox.textContent = "✖ " + data.error;
            } else {
              messageBox.className = "message-box success";
              messageBox.textContent =
                data.message + " Redirecting to Login...";
              document.getElementById("registerForm").reset();
              setTimeout(() => {
                window.location.href = "/login.html";
              }, 2000);
            }
          })
          .catch((err) => {
            messageBox.className = "message-box error";
            messageBox.textContent = "Server error. Please try again.";
            console.error(err);
          });
      }
    </script>
  </body>
</html>
