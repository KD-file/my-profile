<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Kurt Nievera</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="about.html"><i class="fas fa-user"></i> About</a>
      <a href="contact.html" class="active"
        ><i class="fas fa-envelope"></i> Contact</a
      >
      <a href="register.html"><i class="fas fa-user-plus"></i> Register</a>
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
    </nav>

    <div class="container">
      <div class="profile-card">
        <h1 style="margin-bottom: 5px">Contact Me</h1>
        <p style="color: #718096; margin-bottom: 20px">
          Send me a message! I'll read it in the Admin panel.
        </p>

        <form
          id="contactForm"
          class="register-form"
          onsubmit="handleContact(event)"
        >
          <label for="contactName"><i class="fas fa-user"></i> Full Name</label>
          <input
            type="text"
            id="contactName"
            placeholder="Your name"
            required
          />

          <label for="contactEmail"
            ><i class="fas fa-envelope"></i> Email Address</label
          >
          <input
            type="email"
            id="contactEmail"
            placeholder="Your email"
            required
          />

          <label for="contactMessage"
            ><i class="fas fa-comment"></i> Message</label
          >
          <textarea
            id="contactMessage"
            rows="4"
            placeholder="Write your message here..."
            required
          ></textarea>

          <button type="submit" class="btn-register">
            <i class="fas fa-paper-plane"></i> Send Message
          </button>

          <div id="contactMsgBox" class="message-box"></div>
        </form>

        <hr style="margin: 25px 0; border: 1px solid #e2e8f0" />

        <!-- Direct Contact -->
        <h3><i class="fas fa-phone"></i> Direct Contact</h3>
        <div
          class="contact"
          style="
            text-align: left;
            background: #f7fafc;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
          "
        >
          <p><i class="fas fa-phone"></i> 09503064237</p>
          <p><i class="fas fa-envelope"></i> kd27@gmail.com</p>
          <p><i class="fas fa-map-pin"></i> Philippines</p>
        </div>

        <!-- Social Media Links -->
        <h3 style="margin-top: 25px">
          <i class="fas fa-share-alt"></i> Social Media
        </h3>
        <div class="social-links">
          <a href="https://www.facebook.com/kurt.nievera.96" target="_blank">
            <i class="fab fa-facebook"></i> Facebook
          </a>
          <a href="https://www.youtube.com/@kurtdaryl2327" target="_blank">
            <i class="fab fa-youtube"></i> YouTube
          </a>
        </div>
      </div>
    </div>

    <script>
      function handleContact(event) {
        event.preventDefault();

        const name = document.getElementById("contactName").value.trim();
        const email = document.getElementById("contactEmail").value.trim();
        const message = document.getElementById("contactMessage").value.trim();
        const msgBox = document.getElementById("contactMsgBox");

        msgBox.className = "message-box";
        msgBox.textContent = "Sending...";
        msgBox.style.display = "block";
        msgBox.style.background = "#e2e8f0";
        msgBox.style.color = "#2d3748";

        fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, message }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.error) {
              msgBox.className = "message-box error";
              msgBox.textContent = "✖ " + data.error;
            } else {
              msgBox.className = "message-box success";
              msgBox.textContent = "✅ " + data.message;
              document.getElementById("contactForm").reset();
              setTimeout(() => {
                msgBox.style.display = "none";
              }, 4000);
            }
          })
          .catch((err) => {
            msgBox.className = "message-box error";
            msgBox.textContent = "Server error. Please try again.";
            console.error(err);
          });
      }
    </script>
  </body>
</html>
