<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Kurt Nievera</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="about.html"><i class="fas fa-user"></i> About</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
      <a href="register.html" class="active"
        ><i class="fas fa-user-plus"></i> Register</a
      >
    </nav>

    <div class="container">
      <div class="profile-card">
        <h1 style="margin-bottom: 5px">📝 Register</h1>
        <p style="color: #718096; margin-bottom: 20px">
          Create your account to stay connected!
        </p>

        <form
          id="registerForm"
          class="register-form"
          onsubmit="handleRegister(event)"
        >
          <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
          <input
            type="text"
            id="fullName"
            placeholder="Enter your full name"
            required
          />

          <label for="regEmail"
            ><i class="fas fa-envelope"></i> Email Address</label
          >
          <input
            type="email"
            id="regEmail"
            placeholder="Enter your email"
            required
          />

          <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
          <input
            type="password"
            id="regPassword"
            placeholder="Minimum 6 characters"
            required
            minlength="6"
          />

          <label for="regConfirmPassword"
            ><i class="fas fa-check-circle"></i> Confirm Password</label
          >
          <input
            type="password"
            id="regConfirmPassword"
            placeholder="Confirm your password"
            required
          />

          <button type="submit" class="btn-register">
            <i class="fas fa-user-plus"></i> Register Now
          </button>

          <div id="messageBox" class="message-box"></div>
        </form>

        <div
          style="
            margin-top: 20px;
            padding: 15px;
            background: #edf2f7;
            border-radius: 12px;
            text-align: left;
          "
        >
          <p style="font-weight: 600; color: #2d3748">
            <i class="fas fa-database" style="color: #667eea"></i> Registered
            Users (Local Storage):
          </p>
          <div
            id="userList"
            style="
              color: #4a5568;
              font-size: 0.9rem;
              max-height: 100px;
              overflow-y: auto;
            "
          >
            <!-- Users will appear here dynamically -->
          </div>
        </div>
      </div>
    </div>

    <script>
      // Load existing users on page load
      window.onload = function () {
        displayUsers();
      };

      function handleRegister(event) {
        event.preventDefault();

        const name = document.getElementById("fullName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        const confirmPassword =
          document.getElementById("regConfirmPassword").value;
        const messageBox = document.getElementById("messageBox");

        // Validation
        if (password !== confirmPassword) {
          messageBox.className = "message-box error";
          messageBox.textContent = "❌ Passwords do not match!";
          return;
        }

        if (password.length < 6) {
          messageBox.className = "message-box error";
          messageBox.textContent = "❌ Password must be at least 6 characters!";
          return;
        }

        // Check if email already exists in "database" (localStorage)
        let users = JSON.parse(localStorage.getItem("registeredUsers")) || [];
        if (users.some((user) => user.email === email)) {
          messageBox.className = "message-box error";
          messageBox.textContent = "❌ This email is already registered!";
          return;
        }

        // Save to "database"
        const newUser = { name, email, password }; // In real apps, NEVER store plain passwords!
        users.push(newUser);
        localStorage.setItem("registeredUsers", JSON.stringify(users));

        // Success message
        messageBox.className = "message-box success";
        messageBox.textContent =
          "✅ Registration successful! Welcome, " + name + "!";

        // Clear form
        document.getElementById("registerForm").reset();

        // Refresh the user list
        displayUsers();
      }

      function displayUsers() {
        const userList = document.getElementById("userList");
        const users = JSON.parse(localStorage.getItem("registeredUsers")) || [];

        if (users.length === 0) {
          userList.innerHTML =
            '<p style="color: #a0aec0;">No users registered yet.</p>';
          return;
        }

        let html = '<ul style="list-style: none; padding: 0; margin: 5px 0;">';
        users.forEach((user, index) => {
          html += `<li style="padding: 5px 0; border-bottom: 1px solid #e2e8f0;">
                    <strong>${user.name}</strong> (${user.email})
                  </li>`;
        });
        html += "</ul>";
        userList.innerHTML = html;
      }
    </script>
  </body>
</html>
